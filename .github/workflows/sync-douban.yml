name: Sync Douban Charts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

jobs:
  sync-douban:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEBUG: "False"
      USE_SQLITE: "False"
      ALLOWED_HOSTS: ".onrender.com,localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "https://*.onrender.com"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SUPABASE_DB_NAME: ${{ vars.SUPABASE_DB_NAME }}
      SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER }}
      SUPABASE_DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
      SUPABASE_DB_PORT: ${{ vars.SUPABASE_DB_PORT }}
      SUPABASE_DB_SSLMODE: ${{ vars.SUPABASE_DB_SSLMODE }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Django configuration
        run: python manage.py check

      - name: Apply database migrations
        run: python manage.py migrate --no-input

      - name: Sync Douban homepage charts
        run: python manage.py blog sync --force
